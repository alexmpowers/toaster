<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>toaster</title>
    <style>
      /*
       * Static loading shell. Renders the instant WebView2 paints the document,
       * before main.tsx finishes downloading + executing. Replaces the prior
       * default-white window background that made every cold launch look like
       * a white screen for the first 500-2000ms (and made the v0.1.0
       * manualChunks crash visually indistinguishable from a healthy boot).
       *
       * Pure HTML+CSS — no React, no Tauri APIs, no fonts to download — so it
       * survives even if every framework module is broken. React.createRoot
       * replaces the children of #root on mount.
       */
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      /*
       * Pre-React background lives on <html>, NOT <body>, so the cascade
       * hands off cleanly to App.css once the bundle parses. App.css themes
       * `:root` (= the html element) via `background-color: var(--color-background)`,
       * which has higher specificity (0,0,1,0) than `html` here (0,0,0,1)
       * AND is parsed later — so it wins after mount, restoring the
       * user's light/dark theme palette. If we put this on `body` instead,
       * the body's own background paints over the themed html bg and
       * forces dark mode on every user.
       */
      html {
        background: #171717;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
        overflow: hidden;
      }
      #root {
        height: 100%;
      }
      .boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        background: #171717;
        color: #a3a3a3;
        font-size: 0.875rem;
      }
      .boot-splash__spinner {
        width: 2rem;
        height: 2rem;
        border-radius: 9999px;
        border: 2px solid rgba(163, 163, 163, 0.25);
        border-top-color: #a3a3a3;
        animation: boot-splash-spin 0.8s linear infinite;
      }
      @keyframes boot-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
      /*
       * Honor OS-level reduced-motion for vestibular-disorder users. The
       * splash is the very first thing they see, so leaving the spinner
       * uncapped would override the system preference before any React
       * code runs. The text label still tells them the app is loading.
       */
      @media (prefers-reduced-motion: reduce) {
        .boot-splash__spinner {
          animation: none;
        }
      }
      /*
       * Boot-failure panel. Rendered by `renderBootFailure()` in
       * `src/main.tsx` only when `bootstrap()` throws — at which point
       * Tailwind, React, and i18next may all be unloadable. Inline `<style>`
       * here is parsed by WebView2 the moment the document arrives (same
       * exempt channel as `.boot-splash*` above), so this is the only
       * reliable way to style the recovery UI without the build pipeline.
       *
       * Living here also keeps `scripts/gate/check-brand-token-drift.ts`
       * scanning `src/**` strictly — boot-failure colors are intentionally
       * outside that gate's remit because they are part of the static
       * recovery shell, not the themed app surface.
       */
      .boot-failure {
        font-family: system-ui, sans-serif;
        padding: 2rem;
        max-width: 640px;
        margin: 0 auto;
        color: #e5e5e5;
        background: #171717;
        min-height: 100vh;
        box-sizing: border-box;
      }
      .boot-failure__title {
        font-size: 1.25rem;
        margin: 0 0 0.5rem 0;
      }
      .boot-failure__message {
        color: #a3a3a3;
        font-size: 0.875rem;
        margin: 0 0 1rem 0;
      }
      .boot-failure__error {
        background: #262626;
        padding: 0.75rem;
        border-radius: 0.375rem;
        font-size: 0.8125rem;
        white-space: pre-wrap;
        word-break: break-word;
        color: #fca5a5;
        margin: 0 0 1rem 0;
      }
      .boot-failure__details {
        font-size: 0.75rem;
        color: #737373;
      }
      .boot-failure__details summary {
        cursor: pointer;
      }
      .boot-failure__details-pre {
        background: #262626;
        padding: 0.75rem;
        border-radius: 0.375rem;
        white-space: pre-wrap;
        word-break: break-word;
        margin-top: 0.5rem;
      }
      .boot-failure__button {
        margin-top: 1rem;
        padding: 0.5rem 1rem;
        background: #404040;
        color: #e5e5e5;
        border: none;
        border-radius: 0.375rem;
        cursor: pointer;
        font-size: 0.875rem;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <!--
        role="status" + aria-live="polite" lets screen readers announce
        that the app is loading. The "Loading Toaster…" string is in raw
        English on purpose — i18next has not loaded yet at this point in
        the boot sequence, and the whole point of this static splash is
        to render before any framework module downloads. Keeping it
        untranslated is the trade-off we're making for white-screen
        defense in depth.
      -->
      <div
        class="boot-splash"
        data-boot-splash
        role="status"
        aria-live="polite"
      >
        <div class="boot-splash__spinner" aria-hidden="true"></div>
        <p>Loading Toaster…</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
