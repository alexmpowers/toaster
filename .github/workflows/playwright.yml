name: "Playwright"
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "bun.lock"
      - "playwright.config.*"
      - "tests/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    # NOTE: Playwright is currently advisory-only. The UI has been refactored
    # faster than the e2e suite was kept in sync, so roughly half the specs
    # assert on stale DOM selectors (e.g. div.max-w-3xl.w-full.mx-auto) or
    # depend on bindings the test harness can't load yet. Tracking full
    # repair in issue #N; until then we don't want a pre-existing red
    # Playwright run to block unrelated PRs.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium

      - name: Run Playwright tests
        run: bun run test:playwright

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
