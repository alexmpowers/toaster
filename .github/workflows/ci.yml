name: "CI"

# Consolidated lint/format/test workflow. Replaces the previous
# `code-quality.yml` (frontend + Rust lint/format) and `test.yml`
# (Rust unit tests) workflows.
#
# Cross-platform Tauri bundle builds are intentionally NOT part of this
# workflow — they live in the reusable `build.yml` and its callers
# (`main-build.yml`, `test-build.yml`, `release.yml`),
# which have distinct triggers and artifact/signing semantics.

on:
  workflow_dispatch:
    inputs:
      run_export_parity:
        description: "Run export-parity eval in eval harness (may fail until baseline is refreshed)"
        required: false
        default: "false"
      strict_translation_key_usage:
        description: "Fail CI on missing referenced translation keys (safe strict mode)"
        required: false
        default: "false"
      strict_translation_unused_keys:
        description: "When strict translation key usage is enabled, also fail on unreferenced keys (strict-all)"
        required: false
        default: "false"
      trace_settings_updater_coverage:
        description: "Include detailed trace output for settings-updater coverage audit"
        required: false
        default: "false"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "bun.lock"
      - ".eslintrc*"
      - "eslint.config.*"
      - ".prettierrc*"
      - "tsconfig*"
      - "tailwind.config.*"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "bun.lock"
      - ".eslintrc*"
      - "eslint.config.*"
      - ".prettierrc*"
      - "tsconfig*"
      - "tailwind.config.*"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for unused npm dependencies (knip)
        run: npx --yes knip --dependencies

      - name: Check translation consistency
        run: bun run check:translations

      - name: Audit translation key usage (report-only)
        run: |
          if [ "${{ github.event.inputs.strict_translation_key_usage }}" = "true" ]; then
            if [ "${{ github.event.inputs.strict_translation_unused_keys }}" = "true" ]; then
              echo "Running strict-all translation key-usage audit"
              bun run check:translations:key-usage:strict-all
            else
              echo "Running strict translation key-usage audit"
              bun run check:translations:key-usage:strict
            fi
          else
            bun run check:translations:key-usage
          fi

      - name: Check file-size guardrail (monolith cap)
        run: bun run check:file-sizes

      - name: Check design-token drift (no hex literals outside @theme)
        run: bun run check:design-tokens

      - name: Check backend-authority drift (strict)
        run: bun run check:backend-authority:strict

      - name: Check button-variant drift (no raw <button> styling)
        run: bun run check:button-variants

      - name: Check instruction drift across doc files
        run: bun run check:instruction-drift

      - name: Check handy-legacy usage (dead-code guard)
        run: bun run check:handy-legacy

      - name: Check adapter schema (transcription fixture invariants)
        run: bun run check:adapter-schema

      - name: Check feature state consistency
        run: bun run check:feature-state

      - name: Check doc reference reachability
        run: bun run check:reachability

      - name: Check settings-updater coverage (live-preview fan-out)
        run: |
          if [ "${{ github.event.inputs.trace_settings_updater_coverage }}" = "true" ]; then
            bun run check:settings-updater-coverage:strict:trace
          else
            bun run check:settings-updater-coverage
          fi

      - name: Run ESLint
        run: bun run lint

      - name: TypeScript type check
        run: bunx tsc --noEmit

      - name: Run prettier
        run: bun run format:check

  rust-quality:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libasound2-dev libssl-dev libgtk-layer-shell-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install cargo-machete
        run: cargo install --locked cargo-machete

      - name: Check for unused Rust dependencies (cargo-machete)
        run: cargo machete

      - name: Use mock TranscriptionManager (CI only)
        run: |
          # `transcription` is now a directory module; remove it before
          # dropping in the single-file mock so rustc doesn't see both.
          rm -rf src/managers/transcription
          cp src/managers/transcription_mock.rs src/managers/transcription.rs
          # The mock still imports `transcribe_rs::{TranscriptionSegment,
          # TranscriptionResult}`, so we can't drop the crate — only its
          # heavy whisper/onnx/Vulkan features. Rewrite every
          # `transcribe-rs = ...` line (workspace + platform sections) to a
          # minimal, feature-free entry.
          sed -i 's/^transcribe-rs = .*/transcribe-rs = { version = "0.3.8", default-features = false, features = ["whisper-cpp"] }/' Cargo.toml

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  rust-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libasound2-dev libssl-dev libgtk-layer-shell-dev ffmpeg

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Use mock TranscriptionManager (CI only)
        working-directory: src-tauri
        run: |
          # Swap to mock adapter - avoids compiling whisper/Vulkan.
          # `transcription` is now a directory module; remove it before
          # dropping in the single-file mock so rustc doesn't see both.
          rm -rf src/managers/transcription
          cp src/managers/transcription_mock.rs src/managers/transcription.rs
          # Keep transcribe-rs (mock imports `TranscriptionSegment` / `TranscriptionResult`)
          # but strip its heavy whisper/onnx/Vulkan features.
          sed -i 's/^transcribe-rs = .*/transcribe-rs = { version = "0.3.8", default-features = false, features = ["whisper-cpp"] }/' Cargo.toml

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Run eval harness (precision + audio-boundary + export-parity)
        # Fixtures required for all three evals are committed to the repo:
        #   - precision:      src-tauri/tests/fixtures/
        #   - audio-boundary: src-tauri/tests/fixtures/boundary/ (requires scripts/eval/lib/AudioBoundary.psm1 — harness skips when absent)
        #   - export-parity:  eval/fixtures/toaster_example*.mp4 + tests/fixtures/edit-quality.baseline.json
        # Baseline refresh helper:
        #   bun run eval:refresh-edit-quality-baseline
        # ffmpeg is installed above for the export-parity eval.
        # Export parity remains opt-in by workflow_dispatch input until
        # the baseline refresh lands. Set run_export_parity=true when
        # intentionally validating baseline refresh candidates.
        shell: pwsh
        run: |
          if ('${{ github.event.inputs.run_export_parity }}' -eq 'true') {
            Write-Host 'Running eval harness with export parity enabled'
            pwsh -NoProfile -File scripts/eval/run-eval-harness.ps1
          } else {
            Write-Host 'Running eval harness with export parity skipped (default)'
            pwsh -NoProfile -File scripts/eval/run-eval-harness.ps1 -SkipExportParity
          }

      - name: Check export parity deltas (focused)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_export_parity == 'true'
        shell: pwsh
        run: pwsh -NoProfile -File scripts/eval/check-export-parity.ps1

      - name: Upload eval harness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-harness-report
          path: .eval-output/eval-harness-report.json
          if-no-files-found: warn
